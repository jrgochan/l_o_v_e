[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-branch
    --cov-fail-under=99

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    semantic: Semantic validation tests (Connection axis)
    slow: Slow running tests
    requires_ollama: Tests requiring Ollama to be running
    requires_redis: Tests requiring Redis to be running

# Coverage
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__init__.py

[coverage:report]
precision = 2
skip_empty = True

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestDeprecationWarning
