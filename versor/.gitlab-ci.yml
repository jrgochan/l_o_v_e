# GitLab CI/CD Pipeline for Versor Module
# L.O.V.E. Project - Mathematical Engine

stages:
  - test
  - lint
  - build
  - deploy
  - secret-detection

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SECRET_DETECTION_ENABLED: 'true'

include:
  - template: Security/Secret-Detection.gitlab-ci.yml

# Cache dependencies for faster builds
cache:
  paths:
    - .cache/pip
    - venv/

# Test job - Run all unit tests
test:unit:
  stage: test
  image: python:3.11-slim
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest tests/unit/ -v --cov=app --cov-report=term --cov-report=html
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Linting - Code quality checks
lint:flake8:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install flake8
  script:
    - flake8 app/ tests/ --max-line-length=100 --exclude=venv
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Type checking
lint:mypy:
  stage: lint
  image: python:3.11-slim
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r requirements.txt
  script:
    - mypy app/ --ignore-missing-imports
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Code formatting check
lint:black:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install black
  script:
    - black app/ tests/ --check --line-length=100
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Build container image
build:container:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/versor:$CI_COMMIT_SHORT_SHA -f Containerfile .
    - docker build -t $CI_REGISTRY_IMAGE/versor:latest -f Containerfile .
    - docker push $CI_REGISTRY_IMAGE/versor:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/versor:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - docker

# Deploy to staging
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying Versor to staging environment..."
    - curl -X POST $STAGING_WEBHOOK_URL -H "Content-Type:application/json" -d "{\"image\":\"$CI_REGISTRY_IMAGE/versor:$CI_COMMIT_SHORT_SHA\"}"
  environment:
    name: staging
    url: https://staging-versor.love.app
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs: ["build:container"]

# Deploy to production
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying Versor to production..."
    - echo "Image tag:" $CI_COMMIT_SHORT_SHA
  environment:
    name: production
    url: https://versor.love.app
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs: ["test:unit", "build:container"]
