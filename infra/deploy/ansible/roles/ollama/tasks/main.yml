---
- name: Install Ollama
  shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: /usr/local/bin/ollama

- name: Create Ollama User
  user:
    name: ollama
    system: yes
    shell: /sbin/nologin
    state: present

- name: Create Systemd Service for Ollama
  copy:
    dest: /etc/systemd/system/ollama.service
    content: |
      [Unit]
      Description=Ollama Service
      After=network-online.target

      [Service]
      ExecStart=/usr/local/bin/ollama serve
      User=ollama
      Group=ollama
      Restart=always
      RestartSec=3
      Environment="OLLAMA_HOST=0.0.0.0:11434"

      [Install]
      WantedBy=default.target
    mode: '0644'
  notify: Restart Ollama

- name: Enable and Start Ollama
  service:
    name: ollama
    enabled: yes
    state: started
  when: not ansible_check_mode

- name: Pull Ollama Models
  command: "ollama pull {{ item }}"
  loop: "{{ ollama_models | default([]) }}"
  register: pull_result
  changed_when: "'downloading' in pull_result.stdout or 'success' in pull_result.stdout"
  failed_when: pull_result.rc != 0
  # Ensure the service is up first (handled by previous task, but let's be safe)
  when: not ansible_check_mode
