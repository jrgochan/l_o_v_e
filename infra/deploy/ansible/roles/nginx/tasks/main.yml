---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Install Certbot
  dnf:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    nobest: true
    skip_broken: true

- name: Enable and Start Nginx
  service:
    name: nginx
    state: started
    enabled: yes
