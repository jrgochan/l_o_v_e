---
- name: Create Virtual Environments
  command: python3.12 -m venv .venv
  args:
    chdir: "{{ app_dir }}/{{ item }}"
    creates: "{{ app_dir }}/{{ item }}/.venv"
  loop:
    - versor
    - observer
    - listener
    - personaplex
  become_user: "{{ app_user }}"

- name: Install Python Dependencies
  pip:
    requirements: "{{ app_dir }}/{{ item }}/requirements.txt"
    virtualenv: "{{ app_dir }}/{{ item }}/.venv"
  loop:
    - versor
    - observer
    - listener
    - personaplex
  become_user: "{{ app_user }}"

- name: Install Package in Editable Mode (for dependencies)
  pip:
    name: ".[{{ item }}]"
    virtualenv: "{{ app_dir }}/{{ item }}/.venv"
    chdir: "{{ app_dir }}"
  loop:
    - versor
    - observer
    - listener
    # Personaplex might not be in pyproject.toml as an extra yet, check? Assuming it is for now or skip editable install for it if fails.
    # Actually, let's skip editable install for personaplex if it's not in the main repo structure yet or just install deps.
    # Based on directory structure, it is independent.
  become_user: "{{ app_user }}"
  ignore_errors: yes

- name: Deploy Backend Systemd Units
  template:
    src: "love-{{ item }}.service.j2"
    dest: "/etc/systemd/system/love-{{ item }}.service"
    mode: '0644'
  loop:
    - versor
    - observer
    - listener
    - personaplex
    - listener-worker
  notify: Restart Backend Services

- name: Enable Backend Services
  service:
    name: "love-{{ item }}"
    enabled: yes
    state: started
  loop:
    - versor
    - observer
    - listener
    - personaplex
    - listener-worker

- name: Run Database Migrations (Observer)
  shell: |
    cd {{ app_dir }}/observer && .venv/bin/python -m alembic upgrade head
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
  become_user: "{{ app_user }}"
  run_once: true

- name: Validate JSON Data
  shell: |
    .venv/bin/python scripts/validate_data.py
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true

- name: Seed Database Users
  shell: |
    .venv/bin/python scripts/seed_users.py
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true

- name: Seed Database Content (GoEmotions)
  shell: |
    .venv/bin/python scripts/seed_all.py --dataset=goemotions --level=enhanced --force-reseed
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true

- name: Compute Path Matrix
  shell: |
    .venv/bin/python scripts/compute_path_matrix.py --collection "GoEmotions"
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true

- name: Restart Backend Services After Deploy
  service:
    name: "love-{{ item }}"
    state: restarted
    daemon_reload: yes
  loop:
    - versor
    - observer
    - listener
    - personaplex
    - listener-worker
