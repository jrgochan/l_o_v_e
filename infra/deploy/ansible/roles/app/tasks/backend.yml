---
# =============================================================================
# Backend Deployment Tasks
# =============================================================================
# Conditional on deployment_tier and service toggles from group_vars.

# --- Core Services (always deployed) ---

- name: Create Virtual Environments (Core)
  command: python{{ python_version }} -m venv .venv
  args:
    chdir: "{{ app_dir }}/{{ item }}"
    creates: "{{ app_dir }}/{{ item }}/.venv"
  loop:
    - versor
    - observer
    - listener
  become_user: "{{ app_user }}"

- name: Create Virtual Environment (PersonaPlex)
  command: python{{ python_version }} -m venv .venv
  args:
    chdir: "{{ app_dir }}/personaplex"
    creates: "{{ app_dir }}/personaplex/.venv"
  become_user: "{{ app_user }}"
  when: enable_personaplex | default(false) | bool

- name: Install Python Dependencies (Core)
  pip:
    requirements: "{{ app_dir }}/{{ item }}/requirements.txt"
    virtualenv: "{{ app_dir }}/{{ item }}/.venv"
  loop:
    - versor
    - observer
    - listener
  become_user: "{{ app_user }}"

- name: Install Python Dependencies (PersonaPlex)
  pip:
    requirements: "{{ app_dir }}/personaplex/requirements.txt"
    virtualenv: "{{ app_dir }}/personaplex/.venv"
  become_user: "{{ app_user }}"
  when: enable_personaplex | default(false) | bool

- name: Install Package in Editable Mode
  pip:
    name: ".[{{ item }}]"
    virtualenv: "{{ app_dir }}/{{ item }}/.venv"
    chdir: "{{ app_dir }}"
  loop:
    - versor
    - observer
    - listener
  become_user: "{{ app_user }}"
  ignore_errors: yes

# --- Systemd Units ---

- name: Deploy Core Systemd Units
  template:
    src: "love-{{ item }}.service.j2"
    dest: "/etc/systemd/system/love-{{ item }}.service"
    mode: '0644'
  loop:
    - versor
    - observer
    - listener
    - listener-worker
  notify: Restart Backend Services

- name: Deploy PersonaPlex Systemd Unit
  template:
    src: love-personaplex.service.j2
    dest: /etc/systemd/system/love-personaplex.service
    mode: '0644'
  when: enable_personaplex | default(false) | bool
  notify: Restart Backend Services

- name: Enable Core Services
  service:
    name: "love-{{ item }}"
    enabled: yes
    state: started
  loop:
    - versor
    - observer
    - listener
    - listener-worker

- name: Enable PersonaPlex Service
  service:
    name: love-personaplex
    enabled: yes
    state: started
  when: enable_personaplex | default(false) | bool

- name: Disable PersonaPlex Service (when not enabled)
  service:
    name: love-personaplex
    enabled: no
    state: stopped
  when: not (enable_personaplex | default(false) | bool)
  ignore_errors: yes

# --- Database Setup ---

- name: Run Database Migrations (Observer)
  shell: |
    cd {{ app_dir }}/observer && .venv/bin/python -m alembic upgrade head
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
  become_user: "{{ app_user }}"
  run_once: true
  when: run_migrations | default(true) | bool

- name: Validate JSON Data
  shell: |
    .venv/bin/python scripts/validate_data.py
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true

- name: Seed Database Users
  shell: |
    .venv/bin/python scripts/seed_users.py
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true

- name: Seed Database Content
  shell: |
    .venv/bin/python scripts/seed_all.py \
      --dataset={{ seed_dataset | default('goemotions') }} \
      --level={{ seed_level | default('enhanced') }} \
      {% if seed_with_demo | default(false) | bool %}--with-demo {% endif %}\
      {% if seed_with_bootstrap | default(false) | bool %}--with-bootstrap {% endif %}\
      --force-reseed
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true

- name: Compute Path Matrix
  shell: |
    .venv/bin/python scripts/compute_path_matrix.py \
      --collection "{{ item }}"
  args:
    chdir: "{{ app_dir }}/observer"
  environment:
    APP_ENV: production
    POSTGRES_USER: "{{ db_user }}"
    POSTGRES_PASSWORD: "{{ db_password }}"
    POSTGRES_DB: "{{ db_name }}"
    POSTGRES_HOST: "localhost"
    POSTGRES_PORT: "5432"
    PYTHONPATH: "{{ app_dir }}/observer"
  become_user: "{{ app_user }}"
  run_once: true
  loop: >-
    {{
      ['GoEmotions', 'Plutchik Wheel', 'Unified Affective Lexicon']
      if (seed_dataset | default('goemotions')) == 'all'
      else [seed_dataset_collection_map[seed_dataset | default('goemotions')]]
    }}

# --- Restart ---

- name: Restart Core Services After Deploy
  service:
    name: "love-{{ item }}"
    state: restarted
    daemon_reload: yes
  loop:
    - versor
    - observer
    - listener
    - listener-worker

- name: Restart PersonaPlex After Deploy
  service:
    name: love-personaplex
    state: restarted
    daemon_reload: yes
  when: enable_personaplex | default(false) | bool
