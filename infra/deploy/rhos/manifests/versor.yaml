apiVersion: v1
kind: Service
metadata:
  name: love-versor
  labels:
    app: love-stack
    component: versor
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: love-stack
    component: versor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-versor
  labels:
    app: love-stack
    component: versor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: love-stack
      component: versor
  template:
    metadata:
      labels:
        app: love-stack
        component: versor
    spec:
      containers:
        - name: versor
          image: love-versor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
             # Add any specific env vars here
             - name: PYTHONUNBUFFERED
               value: "1"
             - name: ALLOWED_ORIGINS
               value: '["http://localhost:3000", "http://127.0.0.1:3000", "http://localhost:19006", "http://love-experience-love-stack.apps-crc.testing"]'
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: love-versor
  labels:
    app: love-stack
    component: versor
spec:
  to:
    kind: Service
    name: love-versor
  port:
    targetPort: 8001
