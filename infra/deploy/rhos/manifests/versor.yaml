apiVersion: v1
kind: Service
metadata:
  name: love-versor
  labels:
    app: love-stack
    component: versor
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: love-stack
    component: versor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-versor
  labels:
    app: love-stack
    component: versor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: love-stack
      component: versor
  template:
    metadata:
      labels:
        app: love-stack
        component: versor
    spec:
      containers:
        - name: versor
          image: love-versor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
             # Add any specific env vars here
             - name: PYTHONUNBUFFERED
               value: "1"
