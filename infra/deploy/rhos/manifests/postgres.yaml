apiVersion: v1
kind: Service
metadata:
  name: love-db
  labels:
    app: love-stack
    component: database
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: love-stack
    component: database
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: love-db-pvc
  labels:
    app: love-stack
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-db
  labels:
    app: love-stack
    component: database
spec:
  selector:
    matchLabels:
      app: love-stack
      component: database
  template:
    metadata:
      labels:
        app: love-stack
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: love-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: love-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: love-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: db-data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: love-db-pvc
