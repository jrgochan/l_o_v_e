apiVersion: v1
kind: Service
metadata:
  name: love-ollama
  labels:
    app: love-stack
    component: ai
spec:
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: love-stack
    component: ai
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: love-ollama-pvc
  labels:
    app: love-stack
    component: ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-ollama
  labels:
    app: love-stack
    component: ai
spec:
  selector:
    matchLabels:
      app: love-stack
      component: ai
  template:
    metadata:
      labels:
        app: love-stack
        component: ai
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: HOME
              value: "/data"
          volumeMounts:
            - mountPath: /data
              name: ollama-data
          lifecycle:
             postStart:
               exec:
                 command: ["/bin/sh", "-c", "sleep 10 && ollama pull llama3.2"]
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: love-ollama-pvc
