apiVersion: v1
kind: Service
metadata:
  name: love-observer
  labels:
    app: love-stack
    component: observer
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: love-stack
    component: observer
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: love-observer
  labels:
    app: love-stack
    component: observer
spec:
  to:
    kind: Service
    name: love-observer
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-observer
  labels:
    app: love-stack
    component: observer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: love-stack
      component: observer
  template:
    metadata:
      labels:
        app: love-stack
        component: observer
    spec:
      containers:
        - name: observer
          image: love-observer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: love-secrets
                  key: SECRET_KEY
            - name: POSTGRES_HOST
              value: "love-db"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: love-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: love-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: love-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: love-config
                  key: ALLOWED_ORIGINS
            - name: REDIS_HOST
              value: "love-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: OLLAMA_BASE_URL
              value: "http://love-ollama:11434"
            - name: VERSOR_URL
              value: "http://love-versor:8001"
            - name: LISTENER_URL
              value: "http://love-listener:8002"
