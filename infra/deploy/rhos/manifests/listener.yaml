apiVersion: v1
kind: Service
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: love-stack
    component: listener
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: love-stack
      component: listener
  template:
    metadata:
      labels:
        app: love-stack
        component: listener
    spec:
      containers:
        - name: listener
          image: love-listener:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
          env:
             - name: OLLAMA_BASE_URL
               value: "http://love-ollama:11434"
             - name: ALLOWED_ORIGINS
               valueFrom:
                 configMapKeyRef:
                   name: love-config
                   key: ALLOWED_ORIGINS
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  to:
    kind: Service
    name: love-listener
  port:
    targetPort: 8002
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
