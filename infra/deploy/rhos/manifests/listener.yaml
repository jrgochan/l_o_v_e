apiVersion: v1
kind: Service
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: love-stack
    component: listener
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: love-stack
      component: listener
  template:
    metadata:
      labels:
        app: love-stack
        component: listener
    spec:
      containers:
        - name: listener
          image: love-listener:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: OLLAMA_BASE_URL
              value: "http://love-ollama:11434"
