apiVersion: v1
kind: Service
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: love-stack
    component: listener
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: love-stack
      component: listener
  template:
    metadata:
      labels:
        app: love-stack
        component: listener
    spec:
      containers:
        - name: listener
          image: love-listener:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          env:
             - name: SECRET_KEY
               valueFrom:
                 secretKeyRef:
                   name: love-secrets
                   key: SECRET_KEY
             - name: OLLAMA_MODEL
               value: "llama3.2"
             - name: OBSERVER_URL
               value: "http://love-observer:8000"
             - name: OLLAMA_BASE_URL
               value: "http://love-ollama:11434"
             - name: ALLOWED_ORIGINS
               valueFrom:
                 configMapKeyRef:
                   name: love-config
                   key: ALLOWED_ORIGINS
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: love-listener
  labels:
    app: love-stack
    component: listener
spec:
  to:
    kind: Service
    name: love-listener
  port:
    targetPort: 8002
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
