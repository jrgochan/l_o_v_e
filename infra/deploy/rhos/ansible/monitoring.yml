---
- name: Deploy Observability Stack
  hosts: localhost
  gather_facts: false
  vars:
    namespace: love-stack

  tasks:
    - name: Add Prometheus Community Helm Repository
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: "https://prometheus-community.github.io/helm-charts"

    - name: Create Helm values override file
      ansible.builtin.copy:
        dest: /tmp/monitoring-values.yaml
        content: |
          defaultRules:
            create: false
          prometheusOperator:
            createCustomResource: false
            tls:
              enabled: false
            admissionWebhooks:
              enabled: false
              patch:
                enabled: false
            # Satisfy OpenShift SCC by requesting RuntimeDefault seccomp
            securityContext:
              seccompProfile:
                type: RuntimeDefault
            containerSecurityContext:
              seccompProfile:
                type: RuntimeDefault
          prometheus:
            prometheusSpec:
              # Satisfy OpenShift SCC
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
              containerSecurityContext:
                seccompProfile:
                  type: RuntimeDefault
              serviceMonitorSelectorNilUsesHelmValues: false
              podMonitorSelectorNilUsesHelmValues: false
              resources:
                requests:
                  memory: 512Mi
          grafana:
            adminPassword: "prom-operator"
            # Satisfy OpenShift SCC for Grafana
            podSecurityContext:
              seccompProfile:
                type: RuntimeDefault
            containerSecurityContext:
              seccompProfile:
                type: RuntimeDefault
            # OpenShift complains about the default grafana seccomp profile
            assertNoLeakedSecrets: false
          alertmanager:
            enabled: false
          kubernetesServiceMonitors:
            enabled: false
          kubeStateMetrics:
            enabled: false
          nodeExporter:
            enabled: false

    - name: Deploy kube-prometheus-stack via Helm (Shell Fallback)
      ansible.builtin.shell: >
        helm upgrade --install observability prometheus-community/kube-prometheus-stack
        --namespace {{ namespace }}
        --values /tmp/monitoring-values.yaml
        --skip-crds

    - name: Apply explicit L.O.V.E. ServiceMonitors and Custom Grafana Dashboard
      kubernetes.core.k8s:
        state: present
        namespace: "{{ namespace }}"
        definition: "{{ lookup('file', '../manifests/' + item) | from_yaml_all }}"
      loop:
        - service-monitors.yaml
        - grafana-dashboard.yaml

    - name: Get current user ID for SCC
      ansible.builtin.command: oc whoami
      register: current_user
      changed_when: false

    - name: Grant privileged SCC to Grafana ServiceAccount
      ansible.builtin.shell: >
        oc adm policy add-scc-to-user privileged -z observability-grafana -n {{ namespace }}

    - name: Grant privileged SCC to Prometheus Operator ServiceAccount
      ansible.builtin.shell: >
        oc adm policy add-scc-to-user privileged -z observability-kube-prometh-operator -n {{ namespace }}

    - name: Grant privileged SCC to Prometheus Database ServiceAccount
      ansible.builtin.shell: >
        oc adm policy add-scc-to-user privileged -z observability-kube-prometh-prometheus -n {{ namespace }}
