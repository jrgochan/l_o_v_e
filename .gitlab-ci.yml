# L.O.V.E. Stack — GitLab CI/CD Pipeline
# Runs quality checks, tests, and builds for all modules.

stages:
  - quality
  - test
  - build

# ── Common ──────────────────────────────────────────────────
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/
    - .venv/
    - experience/web/node_modules/

default:
  image: python:3.12-slim
  before_script:
    - pip install uv --quiet
    - uv sync --all-extras --quiet
    - export PATH="$CI_PROJECT_DIR/.venv/bin:$PATH"

# ── Quality ─────────────────────────────────────────────────
lint:shell:
  stage: quality
  image: koalaman/shellcheck-alpine:stable
  before_script: []  # Override default (no Python needed)
  script:
    - find infra -name "*.sh" -not -path "*/.venv*" -exec shellcheck -x -S warning {} +
  rules:
    - changes:
        - "infra/**/*.sh"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:python:
  stage: quality
  script:
    - black --check versor/ observer/ listener/
    - isort --check-only versor/ observer/ listener/
    - flake8 versor/ observer/ listener/ --max-line-length=120 --extend-ignore=E203,W503
  rules:
    - changes:
        - "versor/**/*.py"
        - "observer/**/*.py"
        - "listener/**/*.py"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:types:
  stage: quality
  script:
    - mypy versor/app/ --ignore-missing-imports
    - mypy observer/app/ --ignore-missing-imports
    - mypy listener/app/ --ignore-missing-imports
  allow_failure: true
  rules:
    - changes:
        - "versor/**/*.py"
        - "observer/**/*.py"
        - "listener/**/*.py"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:security:
  stage: quality
  script:
    - bandit -r versor/app/ observer/app/ listener/app/ -c pyproject.toml --quiet
  rules:
    - changes:
        - "versor/**/*.py"
        - "observer/**/*.py"
        - "listener/**/*.py"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:typescript:
  stage: quality
  image: node:20-slim
  before_script:
    - cd experience/web && npm ci --quiet
  script:
    - npx tsc --noEmit
    - npx eslint .
  rules:
    - changes:
        - "experience/web/**/*.{ts,tsx}"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Tests ───────────────────────────────────────────────────
test:versor:
  stage: test
  script:
    - cd versor
    - ../.venv/bin/pytest tests/ -m "not slow and not requires_ollama" --tb=short -q
  rules:
    - changes:
        - "versor/**"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:observer:
  stage: test
  services:
    - postgres:16
    - redis:7
  variables:
    POSTGRES_DB: love_test
    POSTGRES_USER: love_user
    POSTGRES_PASSWORD: love_password
    DB_HOST: postgres
    REDIS_HOST: redis
  script:
    - cd observer
    - ../.venv/bin/pytest tests/ -m "not slow and not requires_ollama" --tb=short -q
  rules:
    - changes:
        - "observer/**"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:listener:
  stage: test
  script:
    - cd listener
    - ../.venv/bin/pytest tests/ -m "not slow and not requires_ollama" --tb=short -q
  rules:
    - changes:
        - "listener/**"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:experience:
  stage: test
  image: node:20-slim
  before_script:
    - cd experience/web && npm ci --quiet
  script:
    - npm test -- --passWithNoTests
  rules:
    - changes:
        - "experience/web/**"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Build ───────────────────────────────────────────────────
build:experience:
  stage: build
  image: node:20-slim
  before_script:
    - cd experience/web && npm ci --quiet
  script:
    - npm run build
  artifacts:
    paths:
      - experience/web/dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:docs:
  stage: build
  script:
    - pip install mkdocs mkdocs-material --quiet
    - cd docs && mkdocs build
  artifacts:
    paths:
      - docs/site/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - "docs/**"
