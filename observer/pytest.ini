[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Ignore manual tests
norecursedirs = tests/manual

# Coverage and output options
addopts = 
    -v
    --strict-markers
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-branch
    -ra

# Custom markers
markers =
    unit: Unit tests (no database required)
    integration: Integration tests (requires database)
    semantic: Semantic validation tests (critical emotional distinctions)
    slow: Tests that take significant time

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
