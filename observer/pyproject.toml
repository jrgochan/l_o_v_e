# L.O.V.E. Platform - Python Tool Configuration
# Centralized configuration for code quality tools
#
# This is the canonical configuration maintained in infra/configs/
# It is distributed to modules during setup

[tool.black]
line-length = 100
target-version = ['py312']
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | build
  | dist
  | migrations
  | __pycache__
  | \.pytest_cache
  | htmlcov
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = ["*/migrations/*", "*/__pycache__/*", "*/venv/*"]

[tool.mypy]
python_version = "3.14"
strict = true
plugins = [
    "pydantic.mypy",
    "sqlalchemy.ext.mypy.plugin"
]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_unimported = false  # Too strict for libraries
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
ignore_missing_imports = true  # Many third-party packages lack stubs

# Pydantic plugin configuration
[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# Per-module options for tests
[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false  # Tests can be less strict

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--cov=app",
    "--cov-report=html",
    "--cov-report=term-missing",
    "--cov-branch",
    "--cov-fail-under=100",
    "-ra",
]
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (requires database/services)",
    "semantic: Semantic validation tests (Connection axis)",
    "slow: Slow-running tests",
    "requires_ollama: Tests requiring Ollama",
    "requires_redis: Tests requiring Redis",
]
filterwarnings = [
    "ignore:'crypt' is deprecated and slated for removal in Python 3.13:DeprecationWarning",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__init__.py",
    "*/conftest.py",
]

[tool.coverage.report]
precision = 2
skip_empty = true
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.pydocstyle]
convention = "google"
add-ignore = ["D100", "D104"]  # Missing docstring in public module/package (too strict)
match = "(?!test_).*\\.py"  # Don't check test files

[tool.pylint.messages_control]
disable = [
    "C0111",  # missing-docstring (pydocstyle handles this)
    "R0903",  # too-few-public-methods (Pydantic models)
    "R0913",  # too-many-arguments (common in constructors)
    "W0212",  # protected-access (sometimes needed)
    "W1203",  # logging-fstring-interpolation (intentional - readable and performant)
    "C0415",  # import-outside-toplevel (intentional - avoid circular imports, lazy loading)
    "W0603",  # global-statement (intentional - singleton pattern)
    "C0103",  # invalid-name (intentional - _instance variables for singletons)
    "W0718",  # broad-exception-caught (intentional - service resilience)
    "W0707",  # raise-missing-from (nice-to-have but not critical)
    # SQLAlchemy false positives (known pylint limitations)
    "E1102",  # not-callable (func.now() is valid SQLAlchemy - generates SQL NOW())
    "E1136",  # unsubscriptable-object (Mapped[Type] is valid SQLAlchemy 2.0 typing)
    "E1101",  # no-member (SQLAlchemy & Pydantic use metaprogramming)
    "W0611",  # unused-import (SQLAlchemy models must be imported for registration)
    # Code duplication acceptable in some cases
    "R0801",  # duplicate-code (some repetition acceptable for clarity)
    # Cyclic imports acceptable in SQLAlchemy pattern
    "R0401",  # cyclic-import (SQLAlchemy database <-> models pattern)
    # Style preferences (pylint is too opinionated)
    "R1705",  # no-else-return (elif makes decision trees clearer)
    "R1723",  # no-else-break (explicit elif preferred for clarity)
    "C0301",  # line-too-long (max-line-length=120 handles this, some exceptions OK)
    "C0302",  # too-many-lines (WebSocket protocol is inherently complex)
    # Interface/protocol requirements
    "W0613",  # unused-argument (required by FastAPI/interface signatures)
    "R0917",  # too-many-positional-arguments (business logic complexity)
    # Minor style issues
    "W0511",  # fixme/todo (tracked in issue tracker)
    "W0107",  # unnecessary-pass (sometimes needed for structure)
    "C0200",  # consider-using-enumerate (not always clearer)
    "W0612",  # unused-variable (loop variables, intentional)
    "W0621",  # redefined-outer-name (local import pattern)
    "W0404",  # reimported (intentional lazy imports)
    "R1716",  # chained-comparison (explicit comparisons clearer)
    "W0102",  # dangerous-default-value (handled carefully, Pydantic pattern)
    "W0719",  # broad-exception-raised (intentional for WebSocket resilience)
    "R0911",  # too-many-return-statements (business logic decision trees)
    "W2301",  # unnecessary-ellipsis (valid placeholder/stub pattern)
    "E0601",  # used-before-assignment (false positive in complex control flow)
]

[tool.pylint.format]
max-line-length = 120  # Modern screens can handle longer lines

[tool.pylint.design]
max-locals = 35  # Business logic often needs many variables (complex functions like path generation)
max-statements = 75  # Complex coordinators (WebSocket handlers, etc.)
max-branches = 20  # Decision trees in business logic (insight generation, etc.)
max-attributes = 12  # Database models have many fields

[tool.pylint.similarities]
min-similarity-lines = 10  # Allow small repeated patterns

[tool.bandit]
exclude_dirs = ["tests", "migrations", "venv", ".venv"]
skips = ["B101"]  # assert_used (common in tests, we exclude test dirs anyway)
