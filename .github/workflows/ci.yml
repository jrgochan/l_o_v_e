name: Unified CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ==========================================
  # Python Quality
  # ==========================================
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Development Tools
        run: |
          ./infra/scripts/install-dev-tools.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Run Python Quality Checks
        run: |
          ./infra/scripts/check-python-quality.sh

  # ==========================================
  # Python Unit Tests (per module)
  # ==========================================
  python-tests:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [observer, listener, versor]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Development Tools
        run: |
          ./infra/scripts/install-dev-tools.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Run Unit Tests
        run: |
          source .venv/bin/activate
          cd ${{ matrix.module }}
          python -m pytest tests/unit/ -v --tb=short 2>&1 || true

  # ==========================================
  # Experience (TypeScript) Quality & Tests
  # ==========================================
  experience-quality:
    name: Experience Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: experience/package-lock.json

      - name: Install Dependencies
        working-directory: experience
        run: npm ci

      - name: Run TypeScript Quality Checks
        run: |
          ./infra/scripts/check-typescript-quality.sh
