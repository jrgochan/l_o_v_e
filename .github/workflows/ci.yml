name: Unified CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ==========================================
  # Python Quality & Tests
  # ==========================================
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Development Tools
        run: |
          # Use existing script to set up venv and install dependencies
          ./infra/scripts/install-dev-tools.sh
        env:
          # Avoid interactive prompts if any (though script seems safe)
          DEBIAN_FRONTEND: noninteractive

      - name: Run Python Quality Checks
        run: |
          ./infra/scripts/check-python-quality.sh

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Development Tools
        run: |
          ./infra/scripts/install-dev-tools.sh

      - name: Run Python Tests (Observer, Listener, Versor)
        run: |
          # Running tests for all reliable modules
          ./infra/scripts/run-tests.sh --module="observer listener versor" --coverage=100

  # ==========================================
  # Experience (TypeScript) Quality & Tests
  # ==========================================
  experience-quality:
    name: Experience Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: experience/package-lock.json

      - name: Install Dependencies
        working-directory: experience
        run: npm ci

      - name: Run TypeScript Quality Checks
        run: |
          # Ensure global tools are available or run via npx/npm scripts
          # The script handles npm install if missing, but we did it above for caching
          ./infra/scripts/check-typescript-quality.sh

  experience-tests:
    name: Experience Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: experience/package-lock.json

      - name: Install Dependencies
        working-directory: experience
        run: npm ci

      - name: Run Experience Tests
        run: |
          ./infra/scripts/run-tests.sh --module=experience
